apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'androidx.baselineprofile'

def almaBaseUrl = (project.findProperty('almaBaseUrl') ?: 'https://alma-erp-six.vercel.app')
    .toString()
    .replaceAll('/+$', '')

android {
    namespace "com.almatraders.erp"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.almatraders.erp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 13
        versionName "1.2.1"
        // Preview verification can override the endpoint with
        // `-PalmaBaseUrl=https://...`; production remains the fail-safe default.
        buildConfigField "String", "ALMA_BASE_URL", "\"${almaBaseUrl}\""
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def keystorePath = System.getenv('ALMA_ANDROID_KEYSTORE_PATH')
            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword System.getenv('ALMA_ANDROID_KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('ALMA_ANDROID_KEY_ALIAS') ?: 'alma'
                keyPassword System.getenv('ALMA_ANDROID_KEY_PASSWORD') ?: ''
            }
        }
    }
    // Uncompressed native libs so AGP 8.5+ can page-align the .so to 16 KB in the APK
    // (Android 15 16 KB page-size requirement). Agora 4.5.1 + OneSignal ship 16 KB-ready
    // ELF libs; this makes the packaging honour it.
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
    buildTypes {
        release {
            // R8 full-mode: shrink + obfuscate code and strip unused resources. Keep
            // rules in proguard-rules.pro protect the Capacitor reflection bridge + the
            // JNI native SDKs. Verified on an API 35 emulator (debug-signed release
            // install boots, WebView bridge + native shell work) before shipping.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Real Android phones are ARM — dropping the x86 (emulator-only) ABIs keeps
            // the release download small despite the ~25MB/ABI Agora native libs.
            // `-Parm64Only` drops armeabi-v7a too (~29MB) so the APK fits the 50MB Supabase
            // storage cap for the in-app OTA download; the Play AAB build keeps both ABIs.
            ndk {
                if (project.hasProperty('arm64Only')) {
                    abiFilters 'arm64-v8a'
                } else {
                    abiFilters 'arm64-v8a', 'armeabi-v7a'
                }
            }
            // Prod uses the real upload keystore when the env vars are set; otherwise
            // fall back to the debug keystore so `assembleRelease` is installable for
            // local R8 verification (never ships to Play unsigned/debug-signed).
            if (System.getenv('ALMA_ANDROID_KEYSTORE_PATH')) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }
    // Native Compose screens (ALMA Lifestyle native shell). Compose compiler comes from
    // the org.jetbrains.kotlin.plugin.compose Gradle plugin (Kotlin 2.x way) — no
    // composeOptions block needed.
    buildFeatures {
        compose true
        buildConfig true
    }
    kotlinOptions {
        jvmTarget = '21'
        // Native Compose screens use Material3/Foundation experimental APIs (ModalBottomSheet,
        // FlowRow, etc.) throughout — opt in module-wide instead of per-composable annotations.
        freeCompilerArgs += [
            '-opt-in=androidx.compose.material3.ExperimentalMaterial3Api',
            '-opt-in=androidx.compose.foundation.layout.ExperimentalLayoutApi',
            '-opt-in=androidx.compose.foundation.ExperimentalFoundationApi',
            '-opt-in=androidx.compose.animation.ExperimentalAnimationApi',
            '-opt-in=androidx.compose.ui.ExperimentalComposeUiApi',
        ]
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.work:work-runtime-ktx:$androidxWorkVersion"
    // Installs the bundled Baseline Profile at first run (AOT-compiles the hot
    // startup/scroll paths) — the runtime half of the :baselineprofile module.
    implementation "androidx.profileinstaller:profileinstaller:1.3.1"
    baselineProfile project(':baselineprofile')
    implementation project(':capacitor-android')

    // Native Compose screens (ALMA Lifestyle native shell — Kotlin/Compose twin of the
    // iOS SwiftUI program; same JSON APIs via the WebView cookie session)
    implementation platform('androidx.compose:compose-bom:2024.02.02')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.foundation:foundation'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    // material (M2) pulled in only for the stable pullRefresh API — material3 1.2.x
    // (compose-bom 2024.02) has no PullToRefreshBox yet. Indicator is theme-neutral.
    implementation 'androidx.compose.material:material'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'io.coil-kt:coil-compose:2.5.0'
    // AlmaApi transport (HttpURLConnection can't send PATCH) + document-start JS injection
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    // Agora RTC (audio-only) — native Office intercom / walkie-talkie + 1:1 call.
    implementation 'io.agora.rtc:voice-sdk:4.5.1'
    // OneSignal SDK classes for the native call-notification extension (the Capacitor
    // plugin bundles this exact version at runtime; declared here so the extension's
    // com.onesignal.notifications.* imports resolve at compile time).
    implementation 'com.onesignal:OneSignal:5.9.3'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

def servicesJSON = file('google-services.json')
if (servicesJSON.exists() && servicesJSON.text.trim()) {
    apply plugin: 'com.google.gms.google-services'
} else {
    throw new GradleException(
        "FATAL: android/app/google-services.json not found!\n" +
        "Push notifications WILL NOT WORK without it.\n" +
        "Download from Firebase Console → Project Settings → Android app → google-services.json\n" +
        "Place at: android/app/google-services.json"
    )
}

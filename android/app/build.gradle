apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
    namespace "com.almatraders.erp"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.almatraders.erp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "1.1.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def keystorePath = System.getenv('ALMA_ANDROID_KEYSTORE_PATH')
            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword System.getenv('ALMA_ANDROID_KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('ALMA_ANDROID_KEY_ALIAS') ?: 'alma'
                keyPassword System.getenv('ALMA_ANDROID_KEY_PASSWORD') ?: ''
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (System.getenv('ALMA_ANDROID_KEYSTORE_PATH')) {
                signingConfig signingConfigs.release
            }
        }
    }
    // Native Compose screens (ALMA Lifestyle native shell). Compose compiler comes from
    // the org.jetbrains.kotlin.plugin.compose Gradle plugin (Kotlin 2.x way) — no
    // composeOptions block needed.
    buildFeatures {
        compose true
    }
    kotlinOptions {
        jvmTarget = '21'
        // Native Compose screens use Material3/Foundation experimental APIs (ModalBottomSheet,
        // FlowRow, etc.) throughout — opt in module-wide instead of per-composable annotations.
        freeCompilerArgs += [
            '-opt-in=androidx.compose.material3.ExperimentalMaterial3Api',
            '-opt-in=androidx.compose.foundation.layout.ExperimentalLayoutApi',
            '-opt-in=androidx.compose.foundation.ExperimentalFoundationApi',
            '-opt-in=androidx.compose.animation.ExperimentalAnimationApi',
            '-opt-in=androidx.compose.ui.ExperimentalComposeUiApi',
        ]
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')

    // Native Compose screens (ALMA Lifestyle native shell — Kotlin/Compose twin of the
    // iOS SwiftUI program; same JSON APIs via the WebView cookie session)
    implementation platform('androidx.compose:compose-bom:2024.02.02')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.foundation:foundation'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'io.coil-kt:coil-compose:2.5.0'
    // AlmaApi transport (HttpURLConnection can't send PATCH) + document-start JS injection
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    // Agora RTC (audio-only) — native Office intercom / walkie-talkie + 1:1 call.
    implementation 'io.agora.rtc:voice-sdk:4.5.1'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

def servicesJSON = file('google-services.json')
if (servicesJSON.exists() && servicesJSON.text.trim()) {
    apply plugin: 'com.google.gms.google-services'
} else {
    throw new GradleException(
        "FATAL: android/app/google-services.json not found!\n" +
        "Push notifications WILL NOT WORK without it.\n" +
        "Download from Firebase Console → Project Settings → Android app → google-services.json\n" +
        "Place at: android/app/google-services.json"
    )
}

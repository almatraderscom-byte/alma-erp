<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Alma ERP Offline</title>
    <style>
      html{background:#050506;color-scheme:dark;-webkit-text-size-adjust:100%}
      body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2b2110,#050506 42%);color:#f8f1df;font-family:Inter,system-ui,sans-serif;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
      main{width:min(420px,100%);border:1px solid rgba(201,168,76,.32);border-radius:28px;background:#0b0b0f;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
      .mark{width:48px;height:48px;border-radius:18px;border:1px solid rgba(201,168,76,.45);display:grid;place-items:center;color:#f0d080;background:rgba(201,168,76,.12);font-weight:900}
      p{color:#a1a1aa;line-height:1.6;font-size:13px}
      button{border:1px solid rgba(201,168,76,.45);border-radius:14px;background:rgba(201,168,76,.14);color:#f0d080;padding:10px 14px;font-weight:800}
      .status{margin-top:16px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px;color:#71717a;font-size:11px}
    </style>
  </head>
  <body>
    <main>
      <div class="mark">A</div>
      <h1>Offline mode</h1>
      <p>Alma ERP is installed, but this screen needs a network connection for live business data. Reconnect and retry.</p>
      <button onclick="location.reload()">Retry connection</button>
      <div class="status" id="status">Waiting for connection…</div>
    </main>
    <script>
      function update(){document.getElementById('status').textContent=navigator.onLine?'Connection restored. Tap retry to continue.':'Still offline. Live ERP data is never faked.'}
      addEventListener('online',update);addEventListener('offline',update);update()
    </script>
  </body>
</html>

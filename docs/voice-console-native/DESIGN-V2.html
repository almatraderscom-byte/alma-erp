  :root {
    --bg0: #04070D; --ink: #EAF2FB; --muted: #7C92A9; --faint: #55708C;
    --line: rgba(160, 200, 240, 0.13); --gold: #E2B366; --orb-h: 168; --good: #3BE08F;
    --font-bn: 'Noto Sans Bengali', 'Hind Siliguri', 'Bangla Sangam MN', sans-serif;
    --font-en: 'Schibsted Grotesk', -apple-system, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { background: var(--bg0); color: var(--ink); font-family: var(--font-bn); overflow-x: hidden; min-height: 100dvh; }
  .aurora { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(620px 480px at 50% 18%, hsla(var(--orb-h), 80%, 55%, 0.13), transparent 68%),
      radial-gradient(900px 700px at 85% 95%, hsla(calc(var(--orb-h) + 40), 70%, 45%, 0.06), transparent 70%);
    transition: background 0.5s linear; }
  .dotgrid { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(rgba(150, 200, 245, 0.10) 1px, transparent 1.5px); background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(560px 460px at 50% 22%, #000 20%, transparent 75%);
    mask-image: radial-gradient(560px 460px at 50% 22%, #000 20%, transparent 75%); }
  .app { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 18px calc(22px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; min-height: 100dvh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 4px 18px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .wordmark { font-family: var(--font-en); font-weight: 800; font-size: 19px; letter-spacing: 0.22em; }
  .brand .wordmark .tick { color: var(--gold); }
  .brand .sub { font-size: 12.5px; color: var(--muted); letter-spacing: 0.04em; }
  .topmeta { display: flex; align-items: center; gap: 14px; }
  .clock { font-size: 13.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .livedot { display: flex; align-items: center; gap: 6px; font-family: var(--font-en); font-size: 10.5px; letter-spacing: 0.18em; color: var(--good); }
  .livedot i { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 10px var(--good); animation: blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .main { display: flex; flex-direction: column; flex: 1; gap: 8px; }
  @media (min-width: 980px) {
    .main { display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(0, 0.98fr); gap: 40px; align-items: start; }
    .stage-col { position: sticky; top: 24px; }
  }
  .stage-col { display: flex; flex-direction: column; }
  .stage { position: relative; display: flex; flex-direction: column; align-items: center; padding: 12px 0 6px; }
  .statebadge { align-self: center; display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: linear-gradient(160deg, rgba(140, 190, 240, 0.08), rgba(140, 190, 240, 0.02));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); font-size: 13px; color: var(--muted); margin-bottom: 10px; transition: color 0.4s; }
  .statebadge i { width: 8px; height: 8px; border-radius: 50%; background: hsl(var(--orb-h), 85%, 62%); box-shadow: 0 0 12px hsl(var(--orb-h), 85%, 62%); transition: background 0.5s, box-shadow 0.5s; }
  .orbwrap { position: relative; width: min(72vw, 300px); aspect-ratio: 1; display: grid; place-items: center; cursor: pointer; user-select: none; -webkit-user-select: none; outline: none; }
  .orbwrap:focus-visible::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid hsla(var(--orb-h), 80%, 65%, 0.7); }
  .orb-bloom { position: absolute; inset: -34%; border-radius: 50%;
    background: radial-gradient(circle at 50% 45%, hsla(var(--orb-h), 90%, 60%, 0.34), hsla(var(--orb-h), 90%, 50%, 0.10) 42%, transparent 68%);
    filter: blur(18px); animation: breathe 4.6s ease-in-out infinite; }
  .orb-ring { position: absolute; inset: 4%; border-radius: 50%; padding: 1px;
    background: conic-gradient(from 0deg, transparent 0deg, hsla(var(--orb-h), 90%, 70%, 0.55) 80deg, transparent 160deg, transparent 200deg, hsla(var(--orb-h), 90%, 70%, 0.28) 290deg, transparent 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude; animation: spin 14s linear infinite; }
  canvas.wavering { position: absolute; inset: -18%; width: 136%; height: 136%; }
  canvas.orbgl { position: absolute; inset: -12%; width: 124%; height: 124%; }
  .stage.gl-on .orb { background: none; box-shadow: none; animation: none; }
  .stage.gl-on .orb::after { display: none; }

  var bnTime = new Intl.DateTimeFormat('bn-BD', { timeZone: 'Asia/Dhaka', hour: 'numeric', minute: '2-digit' });

    { transcript: 'আজকে অফিসের নাস্তায় ৮৫০ টাকা খরচ লিখে রাখো', steps: ['খরচের খাত নির্ধারণ — অফিস খাবার', 'ERP লেজারে এন্ট্রি', 'ব্যালেন্স যাচাই'],
      reply: 'লিখে রেখেছি, <span class="sir">Sir</span> — অফিস খাবার খাতে ৮৫০ টাকা। এ মাসে এই খাতে মোট হলো ১২,৪০০ টাকা।',

    return el;
  }
  function drawSpark(cv) {
    var c = cv.getContext('2d'), pts = [14, 12, 16, 13, 18, 17, 22, 20, 26, 24, 30], w = cv.width, h = cv.height, max = 32;
    c.beginPath(); pts.forEach(function (p, i) { var x = (i / (pts.length - 1)) * (w - 8) + 4, y = h - 5 - (p / max) * (h - 12); i ? c.lineTo(x, y) : c.moveTo(x, y); });

  }

  var transcript = document.getElementById('transcript'), transcriptText = document.getElementById('transcriptText');
  var caption = document.getElementById('caption'), stepsEl = document.getElementById('steps');

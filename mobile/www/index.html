<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#C9A84C" />
    <title>Alma ERP</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, rgba(201, 168, 76, 0.14), transparent 34%), #08080a;
        color: #fafaf8;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 1px solid rgba(201, 168, 76, 0.45);
        background: rgba(201, 168, 76, 0.12);
        color: #e8c96a;
        display: grid;
        place-items: center;
        font-weight: 900;
        margin: 0 auto 12px;
      }
      h1 { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a84c; margin: 0 0 8px; }
      p { margin: 0; color: #a1a1aa; font-size: 13px; line-height: 1.5; max-width: 280px; }
      button {
        margin-top: 16px;
        border: 1px solid rgba(201, 168, 76, 0.45);
        background: rgba(201, 168, 76, 0.12);
        color: #e8c96a;
        border-radius: 12px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">A</div>
      <h1>Alma ERP</h1>
      <p id="msg">ইন্টারনেট সংযোগ চেক করুন…</p>
      <button type="button" id="retry" hidden>আবার চেষ্টা</button>
    </div>
    <script>
      var PROD = 'https://alma-erp-six.vercel.app';
      function go() {
        location.replace(PROD);
      }
      document.getElementById('retry').onclick = go;
      if (navigator.onLine === false) {
        document.getElementById('msg').textContent = 'অফলাইন। ইন্টারনেট চালু করে আবার চেষ্টা করুন।';
        document.getElementById('retry').hidden = false;
      } else {
        go();
      }
    </script>
  </body>
</html>

name: Agent Tests
on:
  pull_request:
    paths:
      - 'src/agent/**'
      - 'vitest.config.ts'
  push:
    branches: [main]
    paths:
      - 'src/agent/**'
      - 'vitest.config.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test:agent

name: Deploy Agent Worker to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/alma-erp
            git pull origin main
            cd worker
            npm ci --omit=dev
            pm2 restart alma-agent-worker || pm2 start src/index.mjs --name alma-agent-worker --interpreter node
            pm2 save
            echo "Worker deployed successfully"

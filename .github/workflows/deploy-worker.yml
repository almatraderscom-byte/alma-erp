name: Deploy worker (VPS)

# The VPS worker (pm2 `alma-agent-worker`, includes the voice-relay server) has had NO
# deploy path since deploy-worker.yml was removed on 2026-07-13 — worker/** changes
# merged to main simply never reached the box. Restored here because the voice-relay
# fixes are worker-side. Runs from a GitHub runner, whose egress IP differs from the
# owner's Mac (which the VPS firewall currently blocks on every inbound port).
#
# Manual-only by default: the owner presses Run, so a merge never surprises the live
# worker mid-call. Secrets VPS_HOST + VPS_SSH_KEY already exist in the repo.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy on the VPS'
        required: false
        default: 'main'

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Reachability probe (fails loudly if the box is firewalled)
        run: |
          set -e
          echo "Probing ${{ secrets.VPS_HOST }}:22 …"
          timeout 20 bash -c 'until nc -z -w 5 "${{ secrets.VPS_HOST }}" 22; do sleep 2; done' \
            || { echo "::error::VPS port 22 unreachable from the GitHub runner — the firewall blocks this IP too. Owner must open SSH (Hostinger panel) or deploy manually."; exit 1; }
          echo "port 22 reachable"

      - name: Deploy + restart
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          REF: ${{ inputs.ref || 'main' }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes -o ConnectTimeout=15 "root@$VPS_HOST" bash -s <<EOF
            set -e
            cd /opt/alma-erp
            git fetch --all --prune
            # Self-heal: scripts first created live on the box (e.g. gemini-live-bot.mjs,
            # ngs-*.mjs from the infosoftbd calling work) later landed in git via a PR, so
            # they now sit as UNTRACKED files that block 'git pull' ("would be overwritten").
            # Remove untracked-but-not-ignored files under worker/scripts so the tracked
            # versions can land. -x is intentionally NOT passed, so .env / gitignored runtime
            # state is preserved.
            git clean -fd worker/scripts || true
            # Hard-align to the remote ref (discards stray tracked edits made on the box).
            git checkout -f "$REF"
            git reset --hard "origin/$REF"
            echo "worker now at: \$(git rev-parse --short HEAD)"
            # npm ci self-heal: a leftover/half-removed node_modules dir throws
            # ENOTEMPTY (live fail 2026-07-23) — wipe and retry once before giving up.
            cd worker
            npm ci --omit=dev || { echo "npm ci failed - wiping node_modules and retrying"; rm -rf node_modules; npm ci --omit=dev; }
            pm2 restart alma-agent-worker --update-env
            # Gemini Live bot is a separate pm2 app (scripts/gemini-live-bot.mjs :8766);
            # restart it too when present so bot-side changes (e.g. the Twilio/WhatsApp
            # transport adapter) actually take effect. "|| true" because not every
            # VPS runs it. (NO backticks in these comments - unquoted heredoc turns
            # backticks into command substitution; that broke the 2026-07-23 deploy.)
            pm2 restart gemini-live-bot --update-env || true
            pm2 save
            pm2 list --no-color | head -12
          EOF

      - name: Relay health (only meaningful once the relay port is exposed)
        continue-on-error: true
        run: |
          curl -sS -m 10 "http://${{ secrets.VPS_HOST }}:3100/health" || \
            echo "::warning::relay /health not reachable from the runner — expected while inbound is firewalled; two-way calls need a public wss (Cloudflare tunnel or open 443)."

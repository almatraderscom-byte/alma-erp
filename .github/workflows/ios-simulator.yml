# iOS Simulator build check — compile-verifies the native app WITHOUT signing.
# Never touches TestFlight / App Store Connect, so it cannot consume any
# TestFlight build quota. Safe to run as often as needed.
#
# Triggers (roadmap Phase 4.5): manual, plus pull_request ONLY when native
# assistant code / the protocol schema / turn plumbing changed — those are the
# regressions this gate exists to block. Path-scoped because macOS runners bill
# at 10x minutes; unrelated PRs never pay for a Mac runner.

name: iOS Simulator Build (no TestFlight)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ios/**'
      - 'src/agent/protocol/**'
      - 'src/agent/lib/turn-status.ts'
      - 'src/agent/lib/turn-events.ts'
      - 'src/app/api/assistant/turn/**'
      - 'prisma/schema.prisma'

concurrency:
  group: ios-simulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode on the runner
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies (Capacitor plugins)
        # --ignore-scripts skips "prisma generate" etc. — not needed for the iOS shell
        run: npm ci --ignore-scripts

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build for iOS Simulator (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGNING_ALLOWED=NO

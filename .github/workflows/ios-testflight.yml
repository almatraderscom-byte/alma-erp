# TestFlight upload — MANUAL ONLY. This workflow never runs on push, so
# simulator testing / normal commits can never accidentally burn a TestFlight
# build. To ship: GitHub → Actions → "iOS TestFlight Upload" → Run workflow.
#
# Signing: Xcode cloud signing via an App Store Connect API key
# (-allowProvisioningUpdates). No certificate export needed on the Mac.
# Build numbers: GIT is the source of truth. manageAppVersionAndBuildNumber is
# OFF so the upload carries exactly the committed CURRENT_PROJECT_VERSION —
# the repo rule is "build number in git must always equal the number on
# TestFlight" (that traceability is what the builds 63–69 feature losses cost
# us). Bump + commit + push BEFORE running this workflow; a number already used
# on App Store Connect will be rejected, which is the desired loud failure.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID      — App Store Connect API key ID (e.g. ABC123XYZ)
#   ASC_ISSUER_ID   — issuer ID (UUID from the API Keys page)
#   ASC_PRIVATE_KEY — full contents of the downloaded AuthKey_XXXX.p8 file

name: iOS TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      expected_build:
        description: 'Exact committed CFBundleVersion to upload (this release: 82).'
        required: true
        default: '82'
      marketing_version:
        description: 'App version shown to testers (e.g. 1.1). Leave empty to keep the current project version.'
        required: false
        default: ''

concurrency:
  group: ios-testflight
  cancel-in-progress: false

env:
  TEAM_ID: 5D9FLR3MMA

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Enforce main-current committed build number
        env:
          EXPECTED_BUILD: ${{ inputs.expected_build }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "TestFlight is main-only; selected ref was $GITHUB_REF" >&2
            exit 1
          }
          git fetch origin main --quiet
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo "Checked-out commit is not current origin/main" >&2
            exit 1
          }
          BUILDS=$(grep 'CURRENT_PROJECT_VERSION = ' ios/App/App.xcodeproj/project.pbxproj \
            | sed -E 's/.*= ([0-9]+);/\1/' | sort -u)
          test "$(printf '%s\n' "$BUILDS" | wc -l | tr -d ' ')" = "1" || {
            echo "Project contains inconsistent build numbers: $BUILDS" >&2
            exit 1
          }
          test "$BUILDS" = "$EXPECTED_BUILD" || {
            echo "Committed build is $BUILDS, requested upload is $EXPECTED_BUILD" >&2
            exit 1
          }
          test -z "$(git status --porcelain)" || {
            echo "Checkout is dirty before pipeline stamping" >&2
            exit 1
          }
          echo "Verified main commit $(git rev-parse --short=10 HEAD), build $BUILDS"

      - name: Select newest Xcode on the runner
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies (Capacitor plugins)
        run: npm ci --ignore-scripts

      - name: Generate Prisma client for release tests
        run: npx prisma generate

      - name: Calling release tests and typecheck
        run: |
          npx vitest run src/agent/lib/__tests__/office-call*.test.ts
          npm run type-check

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Stamp the built commit into Info.plist (forensics parity with the Mac path)
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :ALMAGitCommit ${GITHUB_SHA}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :ALMAGitCommit string ${GITHUB_SHA}" "$PLIST"
          echo "ALMAGitCommit=${GITHUB_SHA}"

      - name: Write App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          printf '%s' "$ASC_PRIVATE_KEY" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive (Release, cloud signing)
        working-directory: ios/App
        env:
          MARKETING_VERSION_INPUT: ${{ inputs.marketing_version }}
        run: |
          EXTRA=""
          if [ -n "$MARKETING_VERSION_INPUT" ]; then
            EXTRA="MARKETING_VERSION=$MARKETING_VERSION_INPUT"
          fi
          # Do NOT pass CODE_SIGN_IDENTITY here: a command-line build setting hits
          # EVERY project in the workspace, so it forces the Pods targets to sign
          # with an identity the runner has no certificate for (run 29445470268:
          # "No signing certificate iOS Development found" × 13 pod targets). The
          # App project carries the right identity itself; automatic signing +
          # -allowProvisioningUpdates fetches what it needs, and -exportArchive
          # below distribution-signs in the cloud via the ASC key.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            $EXTRA

      - name: Write export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Clean up API key
        if: always()
        run: rm -f "$RUNNER_TEMP/AuthKey.p8"

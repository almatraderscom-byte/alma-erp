name: Production deploy gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      REGRESSION_BASE_URL: https://alma-erp-six.vercel.app
      REQUIRE_REGRESSION_AUTH: '1'
      CI: 'true'
      REGRESSION_COOKIE: ${{ secrets.REGRESSION_COOKIE }}
      REGRESSION_IDENTIFIER: ${{ secrets.REGRESSION_IDENTIFIER }}
      REGRESSION_PASSWORD: ${{ secrets.REGRESSION_PASSWORD }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify regression auth secrets
        run: |
          if [ -z "$REGRESSION_COOKIE" ] && { [ -z "$REGRESSION_IDENTIFIER" ] || [ -z "$REGRESSION_PASSWORD" ]; }; then
            echo "::error::Set GitHub secret REGRESSION_COOKIE (production __Secure-next-auth.session-token) OR REGRESSION_IDENTIFIER + REGRESSION_PASSWORD (SUPER_ADMIN)"
            exit 1
          fi
          echo "Regression auth configured (values not logged)"

      - run: npm ci

      - name: Block deploy if pending migrations
        run: node scripts/check-pending-migrations.mjs

      - name: Full regression gate (typecheck, build, authenticated smoke)
        run: npm run regression:gate

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Voice Orb — Premium AI Voice Mode</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #05070d; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8ecf4;
    /* radial premium backdrop, ChatGPT-voice-mode dark aesthetic */
    background:
      radial-gradient(120% 120% at 50% 30%, #0b1120 0%, #070a12 45%, #04060b 100%);
    touch-action: none;
    user-select: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* subtle vignette on top of the scene */
  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(75% 75% at 50% 45%, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 2;
  }

  /* ---- UI ---- */
  .hud { position: fixed; z-index: 5; }

  #status {
    top: max(22px, env(safe-area-inset-top)); left: 0; right: 0;
    text-align: center; font-size: 13px; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(200,215,240,0.55);
    font-weight: 500; transition: opacity .4s ease;
  }
  #status b { color: #9fd0ff; font-weight: 600; }

  #controls {
    bottom: max(34px, env(safe-area-inset-bottom)); left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 46px;
  }
  .btn {
    width: 64px; height: 64px; border-radius: 50%;
    display: grid; place-items: center; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    transition: transform .18s cubic-bezier(.2,.8,.2,1), background .25s, border-color .25s, box-shadow .25s;
    color: #dce6f7;
  }
  .btn:hover { transform: translateY(-2px) scale(1.04); background: rgba(255,255,255,0.10); }
  .btn:active { transform: scale(0.94); }
  .btn svg { width: 26px; height: 26px; }
  .btn.mic.live {
    background: rgba(96,165,250,0.22);
    border-color: rgba(120,180,255,0.65);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.12), 0 10px 40px rgba(56,120,255,0.35);
    color: #cfe4ff;
  }
  .btn.close { color: #f4c9c9; }

  #panelToggle { top: max(20px, env(safe-area-inset-top)); right: max(18px, env(safe-area-inset-right)); width: 44px; height: 44px; }
  #panelToggle svg { width: 20px; height: 20px; }

  /* settings panel */
  #panel {
    position: fixed; z-index: 6;
    top: max(72px, calc(env(safe-area-inset-top) + 56px)); right: 16px;
    width: 260px; padding: 16px 18px;
    border-radius: 18px;
    background: rgba(12,17,28,0.72);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(-8px) scale(.98); opacity: 0; pointer-events: none;
    transition: opacity .22s ease, transform .22s cubic-bezier(.2,.8,.2,1);
  }
  #panel.open { opacity: 1; transform: none; pointer-events: auto; }
  #panel h3 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: rgba(180,200,235,0.55); margin-bottom: 12px; font-weight: 600; }
  .row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; font-size: 13px; color: #cbd6ea; }
  .row label { flex: 0 0 auto; margin-right: 10px; }
  .row input[type=range] { flex: 1; accent-color: #6aa8ff; height: 3px; }
  .row .val { flex: 0 0 40px; text-align: right; font-variant-numeric: tabular-nums; color: #8fb6ef; font-size: 12px; }
  .swatches { display: flex; gap: 8px; margin-top: 6px; }
  .sw { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
  .sw:hover { transform: scale(1.12); }
  .sw.active { border-color: #fff; }

  #fps { position: fixed; z-index: 6; left: 12px; top: max(12px, env(safe-area-inset-top));
         font-size: 11px; color: rgba(150,175,215,0.4); font-variant-numeric: tabular-nums; }

  .hint { position: fixed; z-index: 4; bottom: max(112px, calc(env(safe-area-inset-bottom) + 78px));
          left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(170,190,225,0.35);
          letter-spacing: .04em; transition: opacity .5s ease; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>

  <div id="status" class="hud">Tap the mic to <b>speak</b></div>
  <div id="fps" class="hud"></div>
  <div class="hint" id="hint">Drag to rotate · pinch / scroll to zoom</div>

  <button id="panelToggle" class="btn hud" title="Settings" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
      <line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.4" fill="#05070d"/>
      <line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.4" fill="#05070d"/>
    </svg>
  </button>

  <div id="panel">
    <h3>Orb Settings</h3>
    <div class="row"><label>Deform</label><input id="s_deform" type="range" min="0" max="1.5" step="0.01" value="0.55"><span class="val" id="v_deform"></span></div>
    <div class="row"><label>Speed</label><input id="s_speed" type="range" min="0" max="2" step="0.01" value="0.7"><span class="val" id="v_speed"></span></div>
    <div class="row"><label>Detail</label><input id="s_detail" type="range" min="0.5" max="4" step="0.05" value="1.8"><span class="val" id="v_detail"></span></div>
    <div class="row"><label>Bloom</label><input id="s_bloom" type="range" min="0" max="2.5" step="0.01" value="1.05"><span class="val" id="v_bloom"></span></div>
    <div class="row"><label>Aura</label><input id="s_aura" type="range" min="0" max="2" step="0.01" value="1"><span class="val" id="v_aura"></span></div>
    <div class="row"><label>Mic gain</label><input id="s_mic" type="range" min="0" max="4" step="0.05" value="1.6"><span class="val" id="v_mic"></span></div>
    <div class="row" style="align-items:flex-start;flex-direction:column;">
      <label style="margin-bottom:6px;">Palette</label>
      <div class="swatches" id="swatches"></div>
    </div>
  </div>

  <div id="controls" class="hud">
    <button id="mic" class="btn mic" title="Toggle microphone" aria-label="Microphone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/>
      </svg>
    </button>
    <button id="close" class="btn close" title="Stop" aria-label="Stop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

/* ============================================================
   VOICE ORB — premium AI voice-mode visual
   Original implementation. Three.js + GLSL simplex noise,
   audio-reactive, bloom, particle aura, breathing idle.
   ============================================================ */

// ---- Shared GLSL: Ashima / Stefan Gustavson 3D simplex noise (public domain) ----
const GLSL_SIMPLEX = /* glsl */`
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + 1.0 * C.xxx;
  vec3 x2 = x0 - i2 + 2.0 * C.xxx;
  vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
  i = mod(i, 289.0);
  vec4 p = permute(permute(permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 1.0/7.0;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
// fractal brownian motion
float fbm(vec3 p){
  float f = 0.0, a = 0.5;
  for(int i=0;i<5;i++){ f += a*snoise(p); p *= 2.02; a *= 0.5; }
  return f;
}`;

// ---- Palettes (ChatGPT-voice-mode-esque blues + a few premium alternates) ----
const PALETTES = [
  { name:'Aqua',    a:'#2fa8ff', b:'#7fe0ff', c:'#0a63ff', bloom:'#8ecbff' },
  { name:'Violet',  a:'#8b5cf6', b:'#d8b4fe', c:'#5b21b6', bloom:'#c4b5fd' },
  { name:'Ember',   a:'#ff7a45', b:'#ffd08a', c:'#c2410c', bloom:'#ffb27a' },
  { name:'Mint',    a:'#22d3aa', b:'#b8ffe9', c:'#0f766e', bloom:'#8ff0d6' },
  { name:'Rose',    a:'#ff5c8a', b:'#ffc2d6', c:'#be185d', bloom:'#ff9bbd' },
];

class VoiceOrb {
  constructor(mount){
    this.mount = mount;
    this.params = {
      deform: 0.55, speed: 0.7, detail: 1.8, bloom: 1.05,
      aura: 1.0, micGain: 1.6, palette: 0,
    };
    this.audio = { level: 0, low: 0, high: 0, active: false, ctx: null, analyser: null, data: null, stream: null };
    this._clock = new THREE.Clock();
    this._breath = 0;

    this._initRenderer();
    this._initScene();
    this._initOrb();
    this._initAura();
    this._initPost();
    this._initControls();
    this._bindResize();
    this.setPalette(0);

    this._animate = this._animate.bind(this);
    this.renderer.setAnimationLoop(this._animate);
  }

  _initRenderer(){
    const r = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference:'high-performance' });
    r.setClearColor(0x05070d, 1);
    // cap DPR for high, stable FPS on mobile/retina
    this._dpr = Math.min(window.devicePixelRatio || 1, 2);
    r.setPixelRatio(this._dpr);
    r.setSize(this.mount.clientWidth, this.mount.clientHeight);
    r.toneMapping = THREE.ACESFilmicToneMapping;
    r.toneMappingExposure = 1.15;
    r.outputColorSpace = THREE.SRGBColorSpace;
    this.mount.appendChild(r.domElement);
    this.renderer = r;
  }

  _initScene(){
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45, this._aspect(), 0.1, 100);
    this.camera.position.set(0, 0, 5.2);
    // faint background nebula sphere for depth
    const bgGeo = new THREE.SphereGeometry(40, 32, 32);
    const bgMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0x070b14 });
    this.scene.add(new THREE.Mesh(bgGeo, bgMat));
  }

  _initOrb(){
    // High-res icosphere -> smooth liquid deformation
    const geo = new THREE.IcosahedronGeometry(1.15, 128);
    this.uniforms = {
      uTime:     { value: 0 },
      uDeform:   { value: this.params.deform },
      uDetail:   { value: this.params.detail },
      uAudio:    { value: 0 },
      uAudioLow: { value: 0 },
      uAudioHigh:{ value: 0 },
      uColorA:   { value: new THREE.Color() },
      uColorB:   { value: new THREE.Color() },
      uColorC:   { value: new THREE.Color() },
    };
    const mat = new THREE.ShaderMaterial({
      uniforms: this.uniforms,
      vertexShader: GLSL_SIMPLEX + /* glsl */`
        uniform float uTime, uDeform, uDetail, uAudio, uAudioLow, uAudioHigh;
        varying vec3 vNormal, vPos;
        varying float vDisp;
        void main(){
          vec3 p = position;
          float t = uTime * 0.55;
          // layered organic motion: slow base + audio-driven ripples
          float base = fbm(normalize(p) * uDetail + vec3(0.0, t, 0.0));
          float ripple = snoise(normalize(p) * (uDetail*2.3) + vec3(t*1.7)) ;
          float disp = base * uDeform
                     + ripple * (0.10 + uAudioHigh * 0.55)
                     + uAudioLow * 0.45;
          // gentle pulse so audio "breathes" outward
          disp += uAudio * 0.35 * (0.6 + 0.4*sin(t*3.0));
          vec3 displaced = p + normal * disp;
          vDisp = disp;
          vPos = displaced;
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
        }`,
      fragmentShader: /* glsl */`
        precision highp float;
        uniform vec3 uColorA, uColorB, uColorC;
        uniform float uAudio;
        varying vec3 vNormal, vPos;
        varying float vDisp;
        void main(){
          vec3 viewDir = normalize(-vPos);
          float fres = pow(1.0 - max(dot(viewDir, normalize(vNormal)), 0.0), 2.4);
          // color ramp by displacement (crest vs trough) -> liquid metal sheen
          float g = clamp(vDisp * 1.6 + 0.5, 0.0, 1.0);
          vec3 body = mix(uColorC, uColorA, smoothstep(0.0, 0.6, g));
          body = mix(body, uColorB, smoothstep(0.5, 1.0, g));
          // fresnel rim glow + audio brighten
          vec3 col = body + uColorB * fres * (1.3 + uAudio*1.4);
          col += uColorB * 0.15;                 // inner luminance
          col *= 1.0 + uAudio * 0.6;
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    this.orb = new THREE.Mesh(geo, mat);
    this.scene.add(this.orb);

    // inner core glow (soft additive sphere just under the surface)
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x2a6bff, transparent:true, opacity:0.35, blending: THREE.AdditiveBlending });
    this.core = new THREE.Mesh(new THREE.SphereGeometry(0.95, 32, 32), coreMat);
    this.scene.add(this.core);
  }

  _initAura(){
    // particle aura orbiting the orb
    const COUNT = 900;
    const pos = new Float32Array(COUNT * 3);
    const rnd = new Float32Array(COUNT);
    for(let i=0;i<COUNT;i++){
      // random point on a shell
      const r = 1.5 + Math.random()*1.6;
      const th = Math.random()*Math.PI*2;
      const ph = Math.acos(2*Math.random()-1);
      pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
      pos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
      pos[i*3+2] = r*Math.cos(ph);
      rnd[i] = Math.random();
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('aRnd', new THREE.BufferAttribute(rnd, 1));

    this.auraUniforms = {
      uTime:{value:0}, uAudio:{value:0}, uAura:{value:this.params.aura},
      uColor:{value:new THREE.Color('#9fd0ff')}, uDpr:{value:this._dpr},
    };
    const mat = new THREE.ShaderMaterial({
      uniforms: this.auraUniforms,
      transparent:true, depthWrite:false, blending: THREE.AdditiveBlending,
      vertexShader: /* glsl */`
        uniform float uTime, uAudio, uAura, uDpr;
        attribute float aRnd;
        varying float vA;
        void main(){
          vec3 p = position;
          float t = uTime*0.3 + aRnd*6.28;
          // slow orbital drift + audio expansion
          float breathe = 1.0 + 0.06*sin(t*1.5) + uAudio*0.35;
          p *= breathe;
          p.xy *= mat2(cos(t*0.1), -sin(t*0.1), sin(t*0.1), cos(t*0.1));
          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          float twinkle = 0.4 + 0.6*sin(uTime*2.0 + aRnd*20.0);
          vA = twinkle * uAura * (0.5 + uAudio*0.8);
          gl_PointSize = (1.5 + aRnd*3.0) * uDpr * (300.0 / -mv.z) * (0.6 + uAudio*0.9);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: /* glsl */`
        precision mediump float;
        uniform vec3 uColor; varying float vA;
        void main(){
          vec2 c = gl_PointCoord - 0.5;
          float d = length(c);
          if(d>0.5) discard;
          float a = smoothstep(0.5, 0.0, d) * vA;
          gl_FragColor = vec4(uColor, a);
        }`,
    });
    this.aura = new THREE.Points(geo, mat);
    this.scene.add(this.aura);
  }

  _initPost(){
    const size = new THREE.Vector2(this.mount.clientWidth, this.mount.clientHeight);
    this.composer = new EffectComposer(this.renderer);
    this.composer.setPixelRatio(this._dpr);
    this.composer.setSize(size.x, size.y);
    this.composer.addPass(new RenderPass(this.scene, this.camera));

    this.bloom = new UnrealBloomPass(size, this.params.bloom, 0.85, 0.2);
    this.bloom.strength = this.params.bloom;
    this.composer.addPass(this.bloom);

    this.fxaa = new ShaderPass(FXAAShader);
    this._setFxaa();
    this.composer.addPass(this.fxaa);
  }

  _setFxaa(){
    const w = this.mount.clientWidth * this._dpr;
    const h = this.mount.clientHeight * this._dpr;
    this.fxaa.material.uniforms['resolution'].value.set(1/w, 1/h);
  }

  _initControls(){
    const c = new OrbitControls(this.camera, this.renderer.domElement);
    c.enableDamping = true;
    c.dampingFactor = 0.08;
    c.enablePan = false;               // rotate + pinch/scroll zoom only
    c.rotateSpeed = 0.7;
    c.zoomSpeed = 0.8;
    c.minDistance = 3.0;
    c.maxDistance = 9.0;
    c.autoRotate = true;               // subtle idle drift
    c.autoRotateSpeed = 0.35;
    this.controls = c;
  }

  _aspect(){ return this.mount.clientWidth / this.mount.clientHeight; }

  _bindResize(){
    const onResize = () => {
      const w = this.mount.clientWidth, h = this.mount.clientHeight;
      this.camera.aspect = w/h; this.camera.updateProjectionMatrix();
      this.renderer.setSize(w, h);
      this.composer.setSize(w, h);
      this._setFxaa();
    };
    window.addEventListener('resize', onResize);
    this._onResize = onResize;
  }

  // ---- Audio (microphone) ----
  async startMic(){
    if(this.audio.active) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    const ctx = new AC();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:true, noiseSuppression:true } });
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.8;
    src.connect(analyser);
    this.audio = { ctx, analyser, stream, data: new Uint8Array(analyser.frequencyBinCount), level:0, low:0, high:0, active:true };
    if(ctx.state === 'suspended') await ctx.resume();
  }

  stopMic(){
    if(!this.audio.active) return;
    this.audio.stream.getTracks().forEach(t=>t.stop());
    this.audio.ctx.close();
    this.audio.active = false;
    this.audio.level = this.audio.low = this.audio.high = 0;
  }

  _sampleAudio(){
    const a = this.audio;
    if(!a.active){ // decay to 0 when idle
      a.level *= 0.9; a.low *= 0.9; a.high *= 0.9; return;
    }
    a.analyser.getByteFrequencyData(a.data);
    const n = a.data.length;
    let lowSum=0, highSum=0, all=0;
    const split = Math.floor(n*0.15);
    for(let i=0;i<n;i++){ const v = a.data[i]/255; all+=v; if(i<split) lowSum+=v; else highSum+=v; }
    const g = this.params.micGain;
    const level = (all/n) * g;
    const low = (lowSum/split) * g;
    const high = (highSum/(n-split)) * g;
    // smooth
    a.level += (level - a.level)*0.35;
    a.low   += (low   - a.low)*0.35;
    a.high  += (high  - a.high)*0.4;
  }

  // ---- Palette ----
  setPalette(i){
    this.params.palette = i;
    const p = PALETTES[i];
    this.uniforms.uColorA.value.set(p.a);
    this.uniforms.uColorB.value.set(p.b);
    this.uniforms.uColorC.value.set(p.c);
    this.auraUniforms.uColor.value.set(p.bloom);
    this.core.material.color.set(p.c);
  }

  _animate(){
    const dt = Math.min(this._clock.getDelta(), 0.05);
    const t = this._clock.elapsedTime;
    this._sampleAudio();

    // breathing when idle (no audio) — gentle in/out
    this._breath += dt;
    const idle = this.audio.active ? 0 : 1;
    const breath = (Math.sin(this._breath * 0.9) * 0.5 + 0.5) * 0.12 * idle;

    // feed uniforms
    this.uniforms.uTime.value += dt * this.params.speed * (1.0 + this.audio.level*0.5);
    this.uniforms.uDeform.value = this.params.deform;
    this.uniforms.uDetail.value = this.params.detail;
    this.uniforms.uAudio.value     = this.audio.level + breath;
    this.uniforms.uAudioLow.value  = this.audio.low;
    this.uniforms.uAudioHigh.value = this.audio.high;

    // core + orb scale pulse
    const s = 1 + this.audio.level*0.10 + breath*0.6;
    this.orb.scale.setScalar(s);
    this.core.scale.setScalar(s*0.98);
    this.core.material.opacity = 0.30 + this.audio.level*0.4;

    // aura
    this.auraUniforms.uTime.value = t;
    this.auraUniforms.uAudio.value = this.audio.level + breath*0.5;
    this.auraUniforms.uAura.value = this.params.aura;
    this.aura.rotation.y += dt*0.05;

    // bloom follows audio a touch for that "glow surge" on speech
    this.bloom.strength = this.params.bloom * (1 + this.audio.level*0.5);

    this.controls.autoRotateSpeed = this.audio.active ? 0.12 : 0.35;
    this.controls.update();
    this.composer.render();
  }
}

/* ================= wire up UI ================= */
const mount = document.getElementById('app');
const orb = new VoiceOrb(mount);
window._orb = orb;

// FPS meter (lightweight)
const fpsEl = document.getElementById('fps');
let frames=0, last=performance.now();
(function loop(){
  frames++; const now = performance.now();
  if(now-last>=1000){ fpsEl.textContent = frames + ' FPS'; frames=0; last=now; }
  requestAnimationFrame(loop);
})();

// mic button
const micBtn = document.getElementById('mic');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');
micBtn.addEventListener('click', async () => {
  if(orb.audio.active){
    orb.stopMic(); micBtn.classList.remove('live');
    statusEl.innerHTML = 'Tap the mic to <b>speak</b>';
  } else {
    try {
      statusEl.innerHTML = '<b>Listening…</b>';
      await orb.startMic();
      micBtn.classList.add('live');
      hintEl.style.opacity = '0';
    } catch(e){
      statusEl.innerHTML = 'Microphone <b>blocked</b> — allow access';
      console.warn(e);
    }
  }
});
document.getElementById('close').addEventListener('click', () => {
  orb.stopMic(); micBtn.classList.remove('live');
  statusEl.innerHTML = 'Tap the mic to <b>speak</b>';
});

// hide hint after a while
setTimeout(()=>{ hintEl.style.opacity='0'; }, 6000);

// settings panel
const panel = document.getElementById('panel');
document.getElementById('panelToggle').addEventListener('click', ()=> panel.classList.toggle('open'));

function bindSlider(id, key, valId, fmt=(v)=>v.toFixed(2)){
  const el = document.getElementById(id), vEl = document.getElementById(valId);
  const sync = ()=>{ const v = parseFloat(el.value); orb.params[key]=v; vEl.textContent = fmt(v); };
  el.addEventListener('input', sync); sync();
}
bindSlider('s_deform','deform','v_deform');
bindSlider('s_speed','speed','v_speed');
bindSlider('s_detail','detail','v_detail');
bindSlider('s_bloom','bloom','v_bloom');
bindSlider('s_aura','aura','v_aura');
bindSlider('s_mic','micGain','v_mic');

// palette swatches
const sw = document.getElementById('swatches');
PALETTES.forEach((p,i)=>{
  const el = document.createElement('div');
  el.className = 'sw' + (i===0?' active':'');
  el.style.background = `linear-gradient(135deg, ${p.a}, ${p.b})`;
  el.title = p.name;
  el.addEventListener('click', ()=>{
    orb.setPalette(i);
    [...sw.children].forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
  });
  sw.appendChild(el);
});
</script>
</body>

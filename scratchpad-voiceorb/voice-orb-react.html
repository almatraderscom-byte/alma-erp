<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Voice Orb — Siri-style glass</title>
<!-- Fully self-contained: no CDN / libraries / build. Renders from file:// everywhere. -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; user-select: none; transition: background .6s ease, color .6s ease; }
  .screen.light { background: radial-gradient(130% 120% at 50% 22%, #ffffff 0%, #eef4fc 52%, #dde8f5 100%); color: #2b3a52; }
  .screen.dark  { background: radial-gradient(130% 120% at 50% 22%, #121826 0%, #0a0e17 55%, #04060c 100%); color: #dbe6f7; }

  .settings { position: absolute; top: max(16px, env(safe-area-inset-top)); right: 16px; width: 44px; height: 44px; display: grid; place-items: center; border: none; background: transparent; border-radius: 50%; cursor: pointer; color: #9fb0c8; transition: background .25s; }
  .settings:hover { background: rgba(120,140,180,.14); }

  .status { margin-top: max(26px, calc(env(safe-area-inset-top) + 12px)); font-size: 13px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; opacity: .55; text-align: center; height: 18px; }
  .status b { color: #2f7fe0; font-weight: 600; }

  .states { margin-top: 12px; display: flex; gap: 8px; }
  .pill { font-size: 11px; text-transform: capitalize; padding: 5px 12px; border-radius: 999px; cursor: pointer; border: 1px solid rgba(120,140,180,.3); background: transparent; color: inherit; opacity: .7; transition: all .25s; }
  .pill.active { background: #2f7fe0; border-color: #2f7fe0; color: #fff; opacity: 1; }

  .orb-holder { flex: 1; width: 100%; display: grid; place-items: center; }

  /* ============================================================
     SIRI-STYLE GLASS ORB
     Realism comes from stacking physically-motivated layers:
       halo        — colored ambient bloom (light spilling into the room)
       shadow      — soft contact shadow on the "floor" (grounds the object)
       .orb (float + subtle liquid edge)
         sphere    — volumetric shading (light top-left -> dark bottom-right)
         subsurf   — inner scattering glow (light bleeding through glass)
         fluid ×2  — counter-rotating iridescent gradients (the living surface)
         grain     — faint fractal noise so it never looks like flat CSS
         gloss     — broad soft top reflection
         spec      — tight bright specular hotspot (wet glass)
         ring      — fresnel rim light just inside the edge
     ============================================================ */
  .orb-stage { position: relative; width: clamp(220px, 60vw, 320px); aspect-ratio: 1/1; will-change: transform; transition: transform .1s linear; }
  .orb-stage.idle     { animation: breathe 6s ease-in-out infinite; }
  .orb-stage.thinking { animation: breathe 2.6s ease-in-out infinite; }
  .orb-stage.listening{ animation: none; }
  @keyframes breathe { 0%,100% { transform: scale(1);} 50% { transform: scale(1.04);} }

  .halo { position: absolute; inset: -40%; border-radius: 50%; z-index: 0; filter: blur(26px);
    background:
      radial-gradient(circle at 50% 46%, rgba(90,170,255,.5), rgba(80,150,255,.16) 46%, transparent 68%),
      radial-gradient(circle at 62% 60%, rgba(120,110,255,.28), transparent 60%);
    transition: opacity .5s ease; }
  .screen.dark .halo { background:
      radial-gradient(circle at 50% 46%, rgba(100,180,255,.7), rgba(80,150,255,.24) 46%, transparent 68%),
      radial-gradient(circle at 62% 60%, rgba(140,120,255,.4), transparent 60%); }

  .shadow { position: absolute; left: 50%; bottom: -4%; width: 62%; height: 8%; transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(30,70,150,.32), rgba(30,70,150,0) 70%); filter: blur(9px); z-index: 0;
    animation: shadowPulse 6.5s ease-in-out infinite; }
  .screen.dark .shadow { background: radial-gradient(ellipse at center, rgba(0,0,0,.55), rgba(0,0,0,0) 70%); }
  @keyframes shadowPulse { 0%,100% { transform: translateX(-50%) scale(1); opacity: .85;} 50% { transform: translateX(-50%) scale(.82); opacity: .55;} }

  .orb { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; z-index: 1; filter: url(#liquid);
    animation: floaty 6.5s ease-in-out infinite; }
  .orb-stage.thinking .orb { filter: url(#liquidThinking); }
  @keyframes floaty { 0%,100% { transform: translateY(-2.5%);} 50% { transform: translateY(2.5%);} }

  /* volumetric sphere: bright top-left light, deep bottom-right core -> 3D */
  .sphere { position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 36% 28%,
      #ffffff 0%, #e4f2ff 7%, #b7ddff 19%, #7ec2fb 36%, #4a98ee 56%, #2b73d8 74%, #1a56bd 88%, #103f92 100%);
    box-shadow:
      inset -22px -26px 54px rgba(9,38,96,.55),      /* core shadow (volume) */
      inset 16px 18px 44px rgba(255,255,255,.5),      /* fill light top-left */
      inset 0 0 60px rgba(120,180,255,.25); }

  /* subsurface scattering — soft light bleeding through the lower body */
  .subsurf { position: absolute; inset: 0; border-radius: 50%; mix-blend-mode: screen; opacity: .6;
    background: radial-gradient(circle at 54% 68%, rgba(150,215,255,.7), rgba(90,170,255,.2) 34%, transparent 58%); }

  /* iridescent living surface: two counter-rotating blurred gradients */
  .fluid { position: absolute; inset: -14%; border-radius: 50%; pointer-events: none; filter: blur(16px); }
  .fluid.c1 { mix-blend-mode: screen; opacity: .55; animation: spin 18s linear infinite;
    background: conic-gradient(from 0deg at 50% 50%, #8fe0ff, #4aa3ff, #6a7bff, #59e6ff, #3f8dff, #a7c4ff, #8fe0ff); }
  .fluid.c2 { mix-blend-mode: overlay; opacity: .45; animation: spin 26s linear infinite reverse;
    background: conic-gradient(from 120deg at 50% 50%, transparent, #7fd8ff88, #6a7bff66, transparent, #57e0ff88, transparent); }
  .orb-stage.listening .fluid.c1 { animation-duration: 10s; }
  .orb-stage.thinking .fluid.c1 { animation-duration: 4.5s; opacity: .7; }
  .orb-stage.thinking .fluid.c2 { animation-duration: 6s; }
  @keyframes spin { to { transform: rotate(360deg);} }

  /* fine grain for realism (kills the flat look) */
  .grain { position: absolute; inset: 0; border-radius: 50%; mix-blend-mode: overlay; opacity: .12; }

  /* broad glossy top reflection */
  .gloss { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; mix-blend-mode: screen;
    background: radial-gradient(ellipse 74% 42% at 50% 4%, rgba(255,255,255,.55), rgba(255,255,255,0) 62%); }

  /* tight specular hotspot (wet glass shine) */
  .spec { position: absolute; left: 26%; top: 17%; width: 34%; height: 22%; border-radius: 50%; pointer-events: none;
    transform: rotate(-18deg); filter: blur(2px);
    background: radial-gradient(ellipse at 42% 40%, rgba(255,255,255,.98), rgba(255,255,255,.5) 34%, rgba(255,255,255,0) 68%); }
  .spec.small { left: 30%; top: 20%; width: 12%; height: 8%; filter: blur(.4px);
    background: radial-gradient(ellipse at center, #fff, rgba(255,255,255,0) 70%); }

  /* fresnel rim light just inside the edge */
  .ring { position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle at 50% 50%, transparent 66%, rgba(180,220,255,.35) 82%, rgba(255,255,255,.5) 90%, transparent 96%); mix-blend-mode: screen; }

  .controls { width: 100%; max-width: 320px; display: flex; align-items: center; justify-content: space-between; padding: 0 42px; margin-bottom: max(38px, calc(env(safe-area-inset-bottom) + 20px)); }
  .ctrl-btn { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center; cursor: pointer;
    background: rgba(255,255,255,.9); border: 1px solid rgba(20,40,80,.08); box-shadow: 0 10px 26px rgba(70,110,170,.22), inset 0 1px 1px rgba(255,255,255,.8); color: #10151f; backdrop-filter: blur(8px);
    transition: transform .16s cubic-bezier(.2,.8,.2,1), background .3s, box-shadow .3s; }
  .screen.dark .ctrl-btn { background: rgba(235,242,255,.92); }
  .ctrl-btn:hover { transform: translateY(-2px) scale(1.05); }
  .ctrl-btn:active { transform: scale(.9); }
  .ctrl-btn.mic.on { background: #2f7fe0; color: #fff; box-shadow: 0 0 0 4px rgba(47,127,224,.18), 0 12px 30px rgba(47,127,224,.45); }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <!-- subtle liquid edge -->
    <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="3" result="n">
        <animate attributeName="baseFrequency" dur="18s" values="0.007;0.011;0.007" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="liquidThinking" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="5" result="n">
        <animate attributeName="baseFrequency" dur="6s" values="0.010;0.020;0.010" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="22" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation=".8"/>
    </filter>
    <!-- fine grain -->
    <filter id="grainF"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.6  0 0 0 0 0.8  0 0 0 0.8 0"/></filter>
  </defs></svg>

  <div class="screen light" id="screen">
    <button class="settings" id="themeBtn" title="Toggle light / dark" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.3" fill="currentColor"/>
        <line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.3" fill="currentColor"/>
      </svg>
    </button>

    <div class="status" id="status">Tap the mic to <b>speak</b></div>

    <div class="states" id="states">
      <button class="pill active" data-s="idle">idle</button>
      <button class="pill" data-s="listening">listening</button>
      <button class="pill" data-s="thinking">thinking</button>
    </div>

    <div class="orb-holder">
      <div class="orb-stage idle" id="stage">
        <div class="halo"></div>
        <div class="orb">
          <div class="sphere"></div>
          <div class="subsurf"></div>
          <div class="fluid c1"></div>
          <div class="fluid c2"></div>
          <svg class="grain" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice"><rect width="200" height="200" filter="url(#grainF)"/></svg>
          <div class="gloss"></div>
          <div class="spec"></div>
          <div class="spec small"></div>
          <div class="ring"></div>
        </div>
        <div class="shadow"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn mic" id="micBtn" aria-label="Microphone">
        <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="closeBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
  </div>

  <script>
  (function () {
    var screenEl = document.getElementById('screen');
    var stage = document.getElementById('stage');
    var statusEl = document.getElementById('status');
    var micBtn = document.getElementById('micBtn');
    var LABEL = { idle: 'Tap the mic to <b>speak</b>', listening: 'Listening…', thinking: 'Thinking…' };
    var state = 'idle', thinkTimer = null, audioTimer = null, lvl = 0, t = 0;

    function setState(s) {
      state = s;
      stage.className = 'orb-stage ' + s;
      statusEl.innerHTML = LABEL[s];
      micBtn.classList.toggle('on', s === 'listening');
      Array.prototype.forEach.call(document.querySelectorAll('.pill'), function (p) { p.classList.toggle('active', p.dataset.s === s); });

      clearTimeout(thinkTimer);
      if (s === 'thinking') thinkTimer = setTimeout(function () { setState('idle'); }, 2800);

      clearInterval(audioTimer);
      if (s === 'listening') {
        audioTimer = setInterval(function () {
          t += 0.055;
          var env = 0.42 + 0.34 * Math.sin(t * 2.1) + 0.18 * Math.sin(t * 5.7 + 1.3);
          var target = Math.max(0, Math.min(1, env * (0.7 + Math.random() * 0.4)));
          lvl += (target - lvl) * 0.25;
          stage.style.transform = 'scale(' + (1 + lvl * 0.11).toFixed(3) + ')';
        }, 55);
      } else { lvl = 0; stage.style.transform = ''; }
    }

    document.getElementById('states').addEventListener('click', function (e) { if (e.target.dataset && e.target.dataset.s) setState(e.target.dataset.s); });
    micBtn.addEventListener('click', function () { setState(state === 'listening' ? 'thinking' : 'listening'); });
    document.getElementById('closeBtn').addEventListener('click', function () { setState('idle'); });
    document.getElementById('themeBtn').addEventListener('click', function () { screenEl.classList.toggle('dark'); screenEl.classList.toggle('light'); });
  })();
  </script>
</body>
</html>
